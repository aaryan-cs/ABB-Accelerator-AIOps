server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Single-origin: proxy the API to the in-cluster gateway so the browser needs no CORS and no
  # second exposed port. The Service DNS resolves as soon as api.yaml's Service exists (skctl
  # applies it before the dashboard); a transient 502 here just means the api pod isn't ready yet.
  location /api/ {
    proxy_pass http://api.aiops.svc.cluster.local:8088;
    proxy_set_header Host $host;
  }

  # Static export: serve the requested file, its exported .html, or fall back to the app shell.
  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }
}
